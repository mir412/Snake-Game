<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: white;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: black;
      border: 2px solid white;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .overlay input, .overlay button {
      padding: 8px;
      margin: 6px;
      font-size: 16px;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .controls div {
      display: flex;
      gap: 6px;
    }

    .controls button {
      font-size: 20px;
      padding: 10px;
    }
  </style>
</head>

<body>

  <canvas id="game"></canvas>

  <div id="gameOverScreen" class="overlay">
    <h1>Game Over</h1>
    <p id="finalScore"></p>

    <input id="playerName" placeholder="Enter your name" maxlength="10">
    <button onclick="saveScore()">Save Score</button>
    <button onclick="restartGame()">Restart</button>

    <h3>High Scores</h3>
    <ul id="scoreList"></ul>
  </div>

  <!-- Mobile Controls -->
  <div class="controls">
    <button onclick="setDirection(0,-1)">⬆️</button>
    <div>
      <button onclick="setDirection(-1,0)">⬅️</button>
      <button onclick="setDirection(1,0)">➡️</button>
    </div>
    <button onclick="setDirection(0,1)">⬇️</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
